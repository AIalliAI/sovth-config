name: sirvir
version: 1.0.0
description: "Model fleet manager and intelligence engine for Hermes Agent. Autonomous\
  \ model lifecycle manager \u2014 local serving, benchmarking, auto-scaling, API\
  \ fallback, HuggingFace scanning, creator tracking, backend optimization, budget\
  \ monitoring, external app endpoint serving, and consolidated logging."
hermes_requires: '>=0.12.0'
author: SouthpawIN
license: MIT
env_requires:
- name: NVIDIA_API_KEY
  description: NVIDIA NIM API key for free-tier API fallback models. Sign up at https://build.nvidia.com
  required: false
- name: Nous Portal Subscription
  description: PRIMARY. Nous Portal subscription enables the Tool Gateway (Firecrawl
    web search, FAL image generation, OpenAI TTS, Browser Use automation) and gives
    a 10% credit bonus when routing OpenRouter models through Nous. Always prefer
    Nous routing over direct OpenRouter. Sign up at https://nousresearch.com
  required: false
- name: OPENROUTER_API_KEY
  description: "OpenRouter API key for paid API models (GLM 5.2, Qwen 3.7 MAX, etc.).\
    \ Secondary to Nous \u2014 route through Nous when possible for Tool Gateway access\
    \ and the 10% credit bonus."
  required: false
- name: HF_TOKEN
  description: HuggingFace token for model scanning and downloading GGUF files.
  required: false
distribution_owned:
- SOUL.md
- AGENTS.md
- config.yaml
- distribution.yaml
- skills/sirvir-bench
- skills/sirvir-research
- skills/sirvir-scale
- skills/sirvir-serve
- skills/sirvir-budget
source: https://github.com/SouthpawIN/sirvir
installed_at: '2026-06-26T09:27:59+00:00'
